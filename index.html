<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Custom TCP Port Scanner V224</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2E3B2E;
            --card: #3B4C3B;
            --border: #4C634C;
            --accent: #8FBC8F;
            --text: #ffffff;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #a0a0b0;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Go Custom TCP Port Scanner V224</h1>
        <p>High-performance parallel port tester checking system firewall blocks. [Variant 224 using WEB with Matcha theme]</p>
        <button class="btn" onclick="runApp()">Run Module</button>
        <p id="output-box" style="margin-top: 20px; font-family: monospace; color: var(--accent);"></p>
    </div>
    <script>
        function runApp() {
            document.getElementById('output-box').innerText = "Module executed successfully inside Go Custom TCP Port Scanner V224 context.";
        }
    </script>
</body>
</html>
